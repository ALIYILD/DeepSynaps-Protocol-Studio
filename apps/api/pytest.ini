[pytest]
addopts = -n auto --tb=short

# ── Test-discovery hygiene ─────────────────────────────────────────────────
# Only collect files matching standard pytest patterns. This prevents
# untracked local / scratch / e2e experiment files from being picked up
# during full-suite runs and polluting shared DB state under xdist.
testpaths = tests
python_files = test_*.py
norecursedirs = _scratch .* build dist __pycache__ .pytest_cache node_modules

# Developer note:
#   • Committed tests MUST be named test_<something>.py and live directly
#     under apps/api/tests/ or a committed subdirectory.
#   • Local experiments, scratch files, and uncommitted e2e drafts should
#     go in apps/api/tests/_scratch/ (gitignored) or be named
#     local_<something>.py / <something>_local.py (gitignored).
#   • Never leave uncommitted test_*.py files in the tests directory;
#     pytest WILL discover them and they can break the full suite.

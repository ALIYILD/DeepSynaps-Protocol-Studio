# DeepSynaps Protocol Studio — API Fly.io configuration (apps/api)
#
# SOURCE OF TRUTH for Fly deploys. The deploy script uses this file:
#   scripts/deploy-preview.sh --api
#
# Required secrets (set via `fly secrets set KEY=value`):
#   DEEPSYNAPS_DATABASE_URL   — SQLite path or PostgreSQL URL for production DB
#   JWT_SECRET_KEY            — Secret key for JWT signing (min 32 chars)
#   DEEPSYNAPS_SECRETS_KEY    — Fernet key for persisted auth/2FA secrets
#   DEEPSYNAPS_CORS_ORIGINS   — Comma-separated allowed frontend origins
#   STRIPE_SECRET_KEY         — Stripe secret key (when payments are enabled)
#   STRIPE_WEBHOOK_SECRET     — Stripe webhook signing secret
#   WEARABLE_TOKEN_ENC_KEY    — Fernet key required before enabling real wearable OAuth
#   CELERY_BROKER_URL         — Redis broker URL for async qEEG/ERP workers
#   SENTRY_DSN                — Sentry DSN for error tracking (optional)

app = "deepsynaps-studio"
primary_region = "lhr"

[build]
  context = "../.."
  dockerfile = "../../apps/api/Dockerfile"

[env]
  DEEPSYNAPS_APP_ENV = "production"
  DEEPSYNAPS_API_HOST = "0.0.0.0"
  DEEPSYNAPS_API_PORT = "8080"
  DEEPSYNAPS_LOG_LEVEL = "INFO"
  PORT = "8080"
  # MRI Analyzer: when ``1``, ``POST /api/v1/mri/analyze`` persists the canned
  # ``demo/sample_mri_report.json`` payload. Set to ``0`` when the full
  # ``deepsynaps_mri`` neuro stack is deployed.
  # SAFETY: NEVER set to "1" in production — demo data must not mix with real patient data.
  MRI_DEMO_MODE = "0"
  # Evidence pipeline DB lives on the mounted volume below. Evidence routes
  # return 503 with a clear message until the file exists.
  EVIDENCE_DB_PATH = "/data/evidence.db"
  # Voice engine: local volume directory for audio uploads and analysis artifacts.
  # Matches the /data volume mounted below (PR #550 voice_volume_reader default).
  # NOTE: do not re-introduce DEEPSYNAPS_VOICE_BUCKET — voice-engine no longer
  # uses S3 (PR #550 swapped to Fly volume).
  DEEPSYNAPS_VOICE_DIR = "/data/voice"
  # Whisper model size baked into the image. Default fallback in transcription.py
  # is "medium" (~1.5GB RAM) which OOMs even an 8GB VM under load. "base"
  # (~140MB) gives usable English ASR within VM headroom.
  WHISPER_MODEL = "base"
  # Pre-load Whisper weights during app startup (lifespan hook in main.py) so
  # /api/v1/voice/analyze doesn't pay 30-90s of cold-load latency inside the
  # request handler. Failure is logged + swallowed (rule-based fallback works).
  DEEPSYNAPS_VOICE_WARMUP = "1"
  # DEEPSYNAPS_CORS_ORIGINS, DEEPSYNAPS_DATABASE_URL, JWT_SECRET_KEY, and
  # DEEPSYNAPS_SECRETS_KEY must be set as secrets before production boot.

# Process groups:
#   app          — FastAPI HTTP server (public-facing)
#   qeeg_worker  — Celery worker for qEEG/ERP async analysis jobs
#   stripe_worker — Polls StripeWebhookLog outbox every 5 min for retries
[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8080 --app-dir apps/api"
  # NOTE: PYTHONPATH must be set BEFORE celery imports `-A app.jobs` —
  # `--workdir` is honored only after Celery has already resolved the app
  # spec on `sys.path`, so a bare `--workdir /app/apps/api` crash-loops with
  # ModuleNotFoundError: No module named 'app'. Setting PYTHONPATH up front
  # adds /app/apps/api to sys.path before any imports happen.
  qeeg_worker = "sh -c 'PYTHONPATH=/app/apps/api celery -A app.jobs worker --loglevel=INFO --without-gossip --without-mingle'"
  stripe_worker = "sh -c 'while true; do python scripts/retry_stripe_webhooks.py; sleep 300; done'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  # NOTE: SSE connections use long-lived HTTP connections.
  # With auto_stop_machines = true, machines may sleep and cut open SSE streams.
  # The frontend EventSource must handle reconnects on EventSource.CLOSED / onerror.
  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[deploy]
  # alembic.ini lives in apps/api/ — run from that subdirectory
  release_command = "sh -c 'cd /app/apps/api && python -m alembic upgrade head'"

[[vm]]
  # 8gb requires `cpu_kind = "performance"` — the shared family caps at 2GB
  # regardless of memory= value, and Fly silently rejects shared+8gb deploys
  # leaving the app machine on its previous image while workers update.
  # performance-4x = 4 CPU / 8 GB, ~$80/mo while running.
  processes = ["app"]
  # 8gb required: Whisper base + Speechbrain emotion + librosa biomarkers +
  # parselmouth + the FastAPI app stack peak around ~3-4 GB on cold model loads.
  # 2gb crashed the worker on a 1-second WAV during prod smoke run.
  memory = "8gb"
  cpu_kind = "performance"
  cpus = 4

[[vm]]
  # Default memory profile for non-app processes (qeeg_worker, stripe_worker).
  processes = ["qeeg_worker", "stripe_worker"]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "deepsynaps_data"
  destination = "/data"
  initial_size = "1gb"

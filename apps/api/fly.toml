# DeepSynaps Protocol Studio — API Fly.io configuration (apps/api)
#
# Required secrets (set via `fly secrets set KEY=value`):
#   DEEPSYNAPS_DATABASE_URL   — SQLite path or PostgreSQL URL for production DB
#   JWT_SECRET_KEY            — Secret key for JWT signing (min 32 chars)
#   DEEPSYNAPS_SECRETS_KEY    — Fernet key for persisted auth/2FA secrets
#   DEEPSYNAPS_CORS_ORIGINS   — Comma-separated allowed frontend origins (for example https://deepsynaps-studio-preview.netlify.app)
#   STRIPE_SECRET_KEY         — Stripe secret key (when payments are enabled)
#   STRIPE_WEBHOOK_SECRET     — Stripe webhook signing secret
#   WEARABLE_TOKEN_ENC_KEY    — Fernet key required before enabling real wearable OAuth
#   SENTRY_DSN                — Sentry DSN for error tracking (optional)

app = "deepsynaps-studio"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  DEEPSYNAPS_APP_ENV = "production"
  DEEPSYNAPS_LOG_LEVEL = "INFO"
  PORT = "8080"
  # MRI Analyzer: when ``1``, ``POST /api/v1/mri/analyze`` persists the canned
  # ``demo/sample_mri_report.json`` payload (same pattern as qEEG demo). Enables
  # the Netlify preview + demo-login flow without installing FreeSurfer/FastSurfer
  # on the VM. Set to ``0`` when the full ``deepsynaps_mri`` neuro stack is
  # deployed and you want real pipeline jobs instead.
  MRI_DEMO_MODE = "1"
  # Evidence pipeline DB lives on the mounted volume below. The evidence_router
  # serves 503 with a clear message until the file exists. Populate it once per
  # machine (or weekly via cron) with:
  #   fly ssh console -C "python3 /app/services/evidence-pipeline/ingest.py --all --unpaywall"
  # Secrets to set: NCBI_API_KEY, UNPAYWALL_EMAIL, OPENFDA_API_KEY.
  EVIDENCE_DB_PATH = "/data/evidence.db"
  # DEEPSYNAPS_CORS_ORIGINS, DEEPSYNAPS_DATABASE_URL, JWT_SECRET_KEY, and
  # DEEPSYNAPS_SECRETS_KEY must be set as secrets before production boot.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  # NOTE: SSE connections (notifications endpoint) use long-lived HTTP connections.
  # With auto_stop_machines = true, machines may sleep and cut open SSE streams.
  # The frontend EventSource must handle reconnects on EventSource.CLOSED / onerror.
  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[deploy]
  # alembic.ini lives in apps/api/ — run from that subdirectory
  release_command = "sh -c 'cd /app/apps/api && python -m alembic upgrade head'"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "deepsynaps_data"
  destination = "/data"
  initial_size = "1gb"

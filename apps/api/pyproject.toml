[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "deepsynaps-api"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.116.0,<1.0.0",
    # Required by media_router's Form() / UploadFile handlers. Used to be
    # pulled in transitively by older fastapi releases; must be explicit now.
    "python-multipart>=0.0.9",
    "pydantic>=2.11.0,<3.0.0",
    "sqlalchemy>=2.0.0,<3.0.0",
    "uvicorn[standard]>=0.35.0,<1.0.0",
    "aiofiles>=23.0.0,<25.0.0",
    "deepsynaps-core-schema",
    "deepsynaps-condition-registry",
    "deepsynaps-modality-registry",
    "deepsynaps-device-registry",
    "deepsynaps-safety-engine",
    "deepsynaps-generation-engine",
    "slowapi>=0.1.9",
    "alembic>=1.13.0",
    "psycopg2-binary>=2.9.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "stripe>=7.0.0",
    "sentry-sdk[fastapi]>=2.0.0",
    "anthropic>=0.40.0",
    "openai>=1.0.0,<2.0.0",
    "python-telegram-bot>=20.0",
    "pyotp>=2.9",
    "cryptography>=42",
    "pillow>=10",
    # qEEG analysis pipeline — EDF parsing + spectral analysis
    "mne>=1.7.0,<2.0.0",
    "scipy>=1.13.0,<2.0.0",
    "numpy>=1.26.0,<3.0.0",
    # qEEG advanced analyses — aperiodic/periodic spectral decomposition
    "specparam>=2.0.0rc0,<3.0.0",
    # qEEG MNE-Python pipeline (preprocess, ICA, SpecParam, connectivity,
    # eLORETA, normative z-scores, RAG) is installed as a SIBLING editable
    # package by the Dockerfile + developer setup, NOT declared here. Pip's
    # resolver can't pair a declared dep name with a sibling editable path
    # in the same `pip install` invocation, so the package is installed
    # independently instead. The façade in `app/services/qeeg_pipeline.py`
    # imports it at runtime with HAS_MNE_PIPELINE guard, so environments
    # without it still boot. Developers:
    #   pip install -e packages/qeeg-pipeline
]

[tool.setuptools]
py-modules = []

[pytest]
# Worker tests must run in a SEPARATE pytest process from API tests.
# Both apps use an `app` Python package name; running them together causes
# module-namespace collision (app.jobs resolves to apps/api/app/ instead
# of apps/worker/app/).
#
# Correct invocation:
#   cd apps/worker && python -m pytest
#   -- OR --
#   python -m pytest -c apps/worker/pytest.ini apps/worker/tests
testpaths = tests
python_files = test_*.py
norecursedirs = _scratch .* build dist __pycache__ .pytest_cache

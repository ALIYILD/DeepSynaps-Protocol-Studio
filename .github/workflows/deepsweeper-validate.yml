name: Validate Vendored DeepSweeper

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/deepsweeper/**"
      - ".github/workflows/deepsweeper-validate.yml"
  pull_request:
    paths:
      - "tools/deepsweeper/**"
      - ".github/workflows/deepsweeper-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/deepsweeper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tools/deepsweeper/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Verify audit chain
        run: npm run verify-audit
      - name: Check workflow contract
        run: node dist/deepsweeper.js check

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: api-client — drift check
        # Fails if packages/api-client/openapi.json was updated without
        # regenerating src/openapi-types.ts (or vice versa). See
        # packages/api-client/README.md for the regeneration command.
        run: npm run api-client:check-drift
      - name: api-client — typecheck
        run: npm run typecheck --workspace @deepsynaps/api-client
      - name: Web unit tests (registries)
        run: npm run test:unit --workspace @deepsynaps/web
      - name: Build
        run: npm run build:web
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-xdist pytest-timeout httpx
          pip install \
            -e packages/evidence \
            -e packages/qeeg-pipeline \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/clinical-data-registry \
            -e packages/qa \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e packages/biometrics-pipeline \
            -e packages/deeptwin-neuroai-lab \
            -e apps/api
      - name: Run tests
        working-directory: apps/api
        run: python -m pytest -q -n auto --tb=short --timeout=120 --timeout-method=thread

  backend-smoke:
    name: Backend Smoke (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist pytest-timeout httpx
          pip install \
            -e packages/evidence \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/clinical-data-registry \
            -e packages/qa \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e packages/biometrics-pipeline \
            -e packages/deeptwin-neuroai-lab \
            -e apps/api
      - name: Run smoke tests
        working-directory: apps/api
        run: |
          python -m pytest -q -n auto --tb=short --timeout=60 --timeout-method=thread \
            tests/test_health.py \
            tests/test_home_program_tasks.py \
            tests/test_evidence_router.py

  worker-test:
    name: Worker Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/worker/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pydantic celery
          pip install \
            -e packages/evidence \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/clinical-data-registry \
            -e packages/qa \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e packages/biometrics-pipeline \
            -e packages/deeptwin-neuroai-lab \
            -e 'packages/qeeg-pipeline[reporting,source,rag]' \
            -e apps/api \
            -e apps/worker
      - name: Run worker tests
        working-directory: apps/worker
        run: python -m pytest -q --tb=short

  router-schema-lint:
    name: Router Schema Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint routers for top-level BaseModel declarations
        # Architect Rec #5 PR-A: payload types belong in
        # packages/core-schema, not inside FastAPI routers. The linter
        # is AST-only (no imports) and runs in well under 5s. The
        # frozen allowlist at tools/router_basemodel_allowlist.txt lets
        # the legacy 102 routers pass on day one; future PRs migrate
        # types to packages/core-schema and shrink the allowlist.
        run: python3 tools/lint_router_basemodel.py

  api-image-smoke:
    name: API Image Smoke
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build production API image
        run: docker build -f apps/api/Dockerfile -t deepsynaps-api-smoke .
      - name: Smoke import app main in production image
        run: docker run --rm deepsynaps-api-smoke python -c "import sys; sys.path.insert(0, '/app/apps/api'); import app.main"

  router-repo-lint:
    # Architect Rec #8 PR-A: routers must go through app/repositories/
    # rather than importing app.persistence.models directly. The lint
    # is dependency-free (stdlib only), so this job is intentionally
    # tiny and fast — it gates every PR.
    name: Router Repo Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint routers do not import persistence.models
        run: python3 tools/lint_router_no_models.py

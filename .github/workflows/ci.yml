name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Web unit tests (registries)
        run: npm run test:unit --workspace @deepsynaps/web
      - name: Build
        run: npm run build:web
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/web/dist/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package-lock.json') }}
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e --workspace @deepsynaps/web
        env:
          CI: true
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist httpx
          pip install \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e apps/api
      - name: Run tests
        working-directory: apps/api
        run: python -m pytest -q -n auto --tb=short

  backend-smoke:
    name: Backend Smoke (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist httpx
          pip install \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e apps/api
      - name: Run smoke tests
        working-directory: apps/api
        run: |
          python -m pytest -q -n auto --tb=short \
            tests/test_health.py \
            tests/test_home_program_tasks.py \
            tests/test_evidence_router.py

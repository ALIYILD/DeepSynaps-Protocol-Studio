name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Web unit tests (registries)
        run: npm run test:unit --workspace @deepsynaps/web
      - name: Build
        run: npm run build:web
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/web/dist/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package-lock.json') }}
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/qa \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e apps/api
      - name: Start FastAPI backend on :8001
        # vite.config.ts proxies /api and /health to 127.0.0.1:8001, so the
        # backend MUST be listening on that port before Playwright drives the
        # frontend. Run uvicorn in the background and wait for /health.
        working-directory: apps/api
        env:
          DEEPSYNAPS_APP_ENV: test
          DEEPSYNAPS_API_HOST: 127.0.0.1
          DEEPSYNAPS_API_PORT: '8001'
          DEEPSYNAPS_LOG_LEVEL: INFO
          JWT_SECRET_KEY: e2e-ci-test-secret-not-for-production-use-only
        run: |
          nohup python -m uvicorn app.main:app \
            --host 127.0.0.1 --port 8001 \
            > "${GITHUB_WORKSPACE}/uvicorn.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/uvicorn.pid"
      - name: Wait for backend /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8001/health > /dev/null; then
              echo "Backend healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy within 30s"
          echo "--- uvicorn.log ---"
          cat "${GITHUB_WORKSPACE}/uvicorn.log" || true
          exit 1
      - name: Run E2E tests
        run: npm run test:e2e --workspace @deepsynaps/web
        env:
          CI: true
      - name: Stop FastAPI backend
        if: always()
        run: |
          if [ -f "${GITHUB_WORKSPACE}/uvicorn.pid" ]; then
            kill "$(cat "${GITHUB_WORKSPACE}/uvicorn.pid")" || true
          fi
      - name: Upload backend log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-e2e-uvicorn-log
          path: uvicorn.log
          retention-days: 3
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist pytest-timeout httpx
          pip install \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/qa \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e apps/api
      - name: Run tests
        working-directory: apps/api
        run: python -m pytest -q -n auto --tb=short --timeout=120 --timeout-method=thread

  backend-smoke:
    name: Backend Smoke (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist pytest-timeout httpx
          pip install \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/qa \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e apps/api
      - name: Run smoke tests
        working-directory: apps/api
        run: |
          python -m pytest -q -n auto --tb=short --timeout=60 --timeout-method=thread \
            tests/test_health.py \
            tests/test_home_program_tasks.py \
            tests/test_evidence_router.py

  api-image-smoke:
    name: API Image Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production API image
        run: docker build -f apps/api/Dockerfile -t deepsynaps-api-smoke .
      - name: Smoke import app main in production image
        run: docker run --rm deepsynaps-api-smoke python -c "import sys; sys.path.insert(0, '/app/apps/api'); import app.main"

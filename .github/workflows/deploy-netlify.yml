# Auto-deploy the web app to Netlify on every push to main.
#
# Also usable on-demand via the "Run workflow" button on GitHub Actions.
#
# Requires one repo secret:
#   NETLIFY_BUILD_HOOK_URL — Netlify build hook URL for the
#                            deepsynaps-studio-preview site.
#
# The site ID remains pinned in netlify.toml. GitHub Actions validates the
# web build locally, then triggers a production Netlify build via the hook.
# The hook includes ?clear_cache=true to force a clean build when stale
# artifacts have been suspected.

name: Deploy web → Netlify

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/api-client/**"
      - "package.json"
      - "package-lock.json"
      - "netlify.toml"
      - ".github/workflows/deploy-netlify.yml"
  workflow_dispatch:

concurrency:
  group: netlify-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NETLIFY_SITE_ID: 13baea11-07e8-4ab3-9c25-af1f045c845b
      VITE_ENABLE_DEMO: "1"
      VITE_API_BASE_URL: https://deepsynaps-studio.fly.dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies (root — picks up packages/api-client)
        run: npm ci --no-audit --no-fund

      - name: Build (demo flag on, API → Fly)
        run: npm run build:web

      - name: Trigger Netlify Build Hook (with cache clear)
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "::error::NETLIFY_BUILD_HOOK_URL secret is missing."
            echo "Create a Netlify site build hook for the preview site and store its URL as a GitHub Actions secret."
            exit 1
          fi
          echo "Triggering Netlify build hook with cache clear..."
          RESPONSE=$(curl --fail --show-error --silent \
            -X POST \
            -w "\nHTTP_CODE:%{http_code}" \
            "${NETLIFY_BUILD_HOOK_URL}?clear_cache=true")
          echo "$RESPONSE"

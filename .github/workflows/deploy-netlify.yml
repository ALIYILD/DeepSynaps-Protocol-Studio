# Auto-deploy the web app to Netlify on every push to main.
#
# Also usable on-demand via the "Run workflow" button on GitHub Actions.
#
# Requires two repo secrets:
#   NETLIFY_AUTH_TOKEN     — Netlify personal access token for deploys.
#   NETLIFY_BUILD_HOOK_URL — Netlify build hook URL (kept as fallback).
#
# The site ID remains pinned in netlify.toml. GitHub Actions builds the
# site locally, then deploys the dist folder directly to Netlify so the
# update is visible immediately (no async build-queue wait).

name: Deploy web → Netlify

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/api-client/**"
      - "package.json"
      - "package-lock.json"
      - "netlify.toml"
      - ".github/workflows/deploy-netlify.yml"
  workflow_dispatch:

concurrency:
  group: netlify-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NETLIFY_SITE_ID: 13baea11-07e8-4ab3-9c25-af1f045c845b
      VITE_ENABLE_DEMO: "1"
      VITE_API_BASE_URL: https://deepsynaps-studio.fly.dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies (root — picks up packages/api-client)
        run: npm ci --no-audit --no-fund

      - name: Build (demo flag on, API → Fly)
        run: npm run build:web

      - name: Install Netlify CLI (v12 — pre-monorepo detection)
        run: npm install -g netlify-cli@12.2.8

      - name: Deploy to Netlify (direct upload)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN secret is missing. Falling back to build hook."
            exit 1
          fi
          netlify deploy \
            --prod \
            --dir=apps/web/dist \
            --site="$NETLIFY_SITE_ID" \
            --message="Deploy from GitHub Actions ${{ github.sha }}"

      - name: Trigger Netlify Build Hook (fallback)
        if: failure()
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -n "$NETLIFY_BUILD_HOOK_URL" ]; then
            curl --fail --show-error --silent \
              -X POST \
              "$NETLIFY_BUILD_HOOK_URL"
          fi

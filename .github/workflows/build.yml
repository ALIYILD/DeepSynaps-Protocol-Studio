name: Build Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build web
        run: npm run build:web

  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install API and packages (editable)
        run: |
          python -m pip install --upgrade pip
          pip install \
            -e packages/evidence \
            -e packages/core-schema \
            -e packages/clinical-data-registry \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/qa \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e apps/api
      - name: Check API syntax
        run: python -m py_compile apps/api/app/main.py

  build-api-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production API image
        run: docker build -f apps/api/Dockerfile -t deepsynaps-api-smoke .
      - name: Smoke import app main in production image
        run: docker run --rm deepsynaps-api-smoke python -c "import sys; sys.path.insert(0, '/app/apps/api'); import app.main"

name: Coverage

# Phase 1 of the 90% coverage initiative. See docs/test-coverage-plan.md.
#
# Thresholds in this workflow are intentionally set to "baseline + 5" rather
# than the long-term 90 % target — flipping straight to 90 would block every
# PR until Phases 2–6 land. Each phase PR raises the relevant threshold;
# Phase 7 is the cutover to a 90 % gate.
#
# Do NOT lower these to mask regressions. If a PR drops coverage, find out
# why first.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # Required for the codecov/codecov-action upload step (kept opt-in via env).
  pull-requests: write

env:
  PYTHONUNBUFFERED: "1"
  # Bump these in the relevant phase PR — DO NOT lower to game CI.
  COV_THRESHOLD_BACKEND: "60"
  COV_THRESHOLD_WORKER: "60"
  # Honest baselines after PR #642 landed `all: true` in apps/web/.c8rc.json
  # (previously c8 only measured imported files, which over-stated %).
  COV_THRESHOLD_FRONTEND_LINES: "40"
  COV_THRESHOLD_FRONTEND_BRANCHES: "60"
  COV_THRESHOLD_FRONTEND_FUNCTIONS: "25"
  COV_THRESHOLD_PACKAGES: "60"

jobs:
  backend-coverage:
    name: Backend coverage (apps/api)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-xdist httpx
          pip install \
            -e packages/evidence \
            -e packages/qeeg-pipeline \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/clinical-data-registry \
            -e packages/qa \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e packages/biometrics-pipeline \
            -e packages/deeptwin-neuroai-lab \
            -e apps/api
      - name: Run pytest with coverage
        working-directory: apps/api
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=${{ env.COV_THRESHOLD_BACKEND }} \
            -o "addopts=" \
            --tb=short --timeout=120 --timeout-method=thread \
            -q
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: apps/api/coverage.xml
          retention-days: 30
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: apps/api/htmlcov/
          retention-days: 14

  worker-coverage:
    name: Worker coverage (apps/worker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/worker/pyproject.toml
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout numpy pydantic celery
          pip install \
            -e packages/evidence \
            -e packages/core-schema \
            -e packages/condition-registry \
            -e packages/modality-registry \
            -e packages/device-registry \
            -e packages/clinical-data-registry \
            -e packages/qa \
            -e packages/safety-engine \
            -e packages/generation-engine \
            -e packages/render-engine \
            -e packages/biometrics-pipeline \
            -e packages/deeptwin-neuroai-lab \
            -e 'packages/qeeg-pipeline[reporting,source,rag]' \
            -e apps/api \
            -e apps/worker
      - name: Run pytest with coverage
        working-directory: apps/worker
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=${{ env.COV_THRESHOLD_WORKER }} \
            --tb=short
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-coverage-xml
          path: apps/worker/coverage.xml
          retention-days: 30

  frontend-coverage:
    name: Frontend coverage (apps/web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Vite 7 needs Node ≥20.19 or ≥22.12. .nvmrc pins 20.20.2.
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (some tests require it)
        run: npm run build:web
      - name: Run c8 coverage
        run: |
          npm run test:coverage:ci --workspace @deepsynaps/web -- \
            --lines=${{ env.COV_THRESHOLD_FRONTEND_LINES }} \
            --branches=${{ env.COV_THRESHOLD_FRONTEND_BRANCHES }} \
            --functions=20 \
            --statements=${{ env.COV_THRESHOLD_FRONTEND_LINES }}
      - name: Upload coverage lcov
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-lcov
          path: apps/web/coverage/lcov.info
          retention-days: 30
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-html
          path: apps/web/coverage/lcov-report/
          retention-days: 14
      - name: Upload coverage summary JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-summary
          path: apps/web/coverage/coverage-summary.json
          retention-days: 30

  packages-coverage:
    name: Packages coverage (matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Only the packages that have a tests/ directory today. Phase 5 adds
        # tests for: api-client, condition-registry, core-schema,
        # deepsynaps-core, device-registry, modality-registry, safety-engine.
        package:
          - clinical-data-registry
          - qa
          - qeeg-pipeline
          - generation-engine
          - render-engine
          - evidence
          - biometrics-pipeline
          - mri-pipeline
          - qeeg-encoder
          - neuro-engine
          - deeptwin-neuroai-lab
          - feature-store
          - text-pipeline
          - audio-pipeline
          - video-pipeline
          - voice-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          # Install the package under test plus its sibling deps. Most packages
          # depend only on core-schema; the loop in install-python keeps the
          # graph correct for combined runs.
          pip install -e packages/core-schema || true
          pip install -e packages/${{ matrix.package }}
      - name: Run pytest with coverage
        working-directory: packages/${{ matrix.package }}
        run: |
          python -m pytest tests/ \
            --cov-config=${{ github.workspace }}/.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=${{ env.COV_THRESHOLD_PACKAGES }} \
            -q
      - name: Upload package coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-coverage-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage.xml
          retention-days: 30

  coverage-summary:
    name: Coverage summary
    runs-on: ubuntu-latest
    needs:
      - backend-coverage
      - worker-coverage
      - frontend-coverage
      - packages-coverage
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Print summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for suite in backend-coverage worker-coverage frontend-coverage packages-coverage; do
            echo "| $suite | see job result |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reports: see Artifacts → \`backend-coverage-html\`, \`frontend-coverage-html\`, \`backend-coverage-xml\`, \`frontend-coverage-lcov\`, etc." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [docs/test-coverage-plan.md](../blob/main/docs/test-coverage-plan.md) for the lift schedule." >> $GITHUB_STEP_SUMMARY

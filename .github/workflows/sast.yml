# =============================================================================
# SAST (Static Application Security Testing)
# DeepSynaps Protocol Studio — Clinical Neuromodulation Platform
# =============================================================================
# Runs Bandit, Semgrep, and ESLint security plugins on every push/PR.
# Produces SARIF output for the GitHub Security tab.
# Fails on high/critical findings unless emergency override is applied.
#
# HIPAA Security Rule mapping:
#   - §164.312(a)(1) — Access Control (input validation, auth checks)
#   - §164.312(b) — Audit Controls (security scanning audit trail)
#   - §164.308(a)(8) — Security Scanning & Patch Management
# =============================================================================

name: SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      emergency_override:
        description: 'Emergency override — skip fail-on-high (use only for hotfix deployments)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  # Emergency override: set to 'true' via workflow_dispatch for critical hotfixes.
  # Requires post-incident review within 24 hours.
  EMERGENCY_OVERRIDE: ${{ github.event.inputs.emergency_override || 'false' }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Bandit — Python SAST
  # ───────────────────────────────────────────────────────────────────────────
  bandit:
    name: Bandit Python SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install Bandit
        run: pip install 'bandit[sarif,toml]'

      - name: Run Bandit scan (SARIF)
        # Skips: B101 (assert_used) — common in FastAPI test patterns
        #        B104 (hardcoded_bind_all_interfaces) — Docker requirement
        #        B105,B106,B107 (hardcoded_password*) — false positives on Pydantic field names
        #        B311 (blacklist_random) — used for demo data generation only
        run: |
          bandit \
            -r apps/api/ packages/ \
            -f sarif \
            -o bandit-results.sarif \
            --skip B101,B104,B105,B106,B107,B311 \
            --exclude './.venv,./venv,./tests,./*/tests/*' \
            --confidence-level medium \
            || true

      - name: Run Bandit scan (text for job log)
        run: |
          # --severity-level high so the gate below only fails on HIGH
          # severity findings (the step's stated intent — see step name
          # below). Low/medium findings still appear in the SARIF upload
          # for triage in the Security tab.
          bandit \
            -r apps/api/ packages/ \
            --skip B101,B104,B105,B106,B107,B311 \
            --exclude './.venv,./venv,./tests,./*/tests/*' \
            --confidence-level medium \
            --severity-level high \
            --format txt \
            > bandit-report.txt || BANDIT_EXIT=$?
          cat bandit-report.txt
          echo "bandit_exit=${BANDIT_EXIT:-0}" >> "$GITHUB_ENV"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload Bandit report artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
          retention-days: 30

      - name: Fail on high-severity findings
        if: env.EMERGENCY_OVERRIDE != 'true'
        run: |
          if [ "${{ env.bandit_exit }}" != "0" ] && [ "${{ env.bandit_exit }}" != "" ]; then
            echo "::error::Bandit found HIGH-severity security issues. Review the report above."
            echo "::error::To override for emergency hotfix, re-run with emergency_override=true"
            exit 1
          fi
          echo "No high-severity Bandit findings."

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Semgrep — Custom security rules + OWASP
  # ───────────────────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install --quiet semgrep

      - name: Run Semgrep scan
        # Use `semgrep scan` (always exits 0 even with findings) so the
        # downstream "Check for critical/high findings" gate is the sole
        # blocking decision. `semgrep ci` is intended for app-token PR
        # comment workflows and exits 1 on every finding, which makes
        # the gate redundant.
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/cwe-top-25 \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --sarif \
            --output semgrep-results.sarif \
            --disable-version-check \
            --metrics off \
            --error || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        if: always()

      - name: Check for critical/high findings
        if: env.EMERGENCY_OVERRIDE != 'true'
        run: |
          if [ -f semgrep-results.sarif ]; then
            COUNT=$(jq '[.runs[].results[] | select(.level == "error" or .level == "warning")] | length' semgrep-results.sarif || echo "0")
            echo "Semgrep findings count: $COUNT"
            if [ "$COUNT" -gt 0 ]; then
              echo "::warning::$COUNT Semgrep findings detected — review SARIF in Security tab"
              # Do not fail on warnings, only errors
              ERRORS=$(jq '[.runs[].results[] | select(.level == "error")] | length' semgrep-results.sarif || echo "0")
              if [ "$ERRORS" -gt 0 ]; then
                echo "::error::$ERRORS ERROR-level Semgrep findings found"
                exit 1
              fi
            fi
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: ESLint Security — TypeScript/React frontend
  # ───────────────────────────────────────────────────────────────────────────
  eslint-security:
    name: ESLint Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install ESLint security plugins
        # Pin eslint@8 because the security/no-secrets/sdl plugins below ship
        # legacy (.eslintrc) configs that ESLint 9's flat-only resolver
        # rejects. Project root may have eslint 9 from `npm ci`; this
        # downgrade is scoped to this CI step's node_modules and does not
        # affect the app build elsewhere.
        run: |
          npm install --save-dev --no-save \
            eslint@8 \
            eslint-plugin-security \
            eslint-plugin-no-secrets \
            @microsoft/eslint-plugin-sdl \
            @microsoft/eslint-formatter-sarif

      - name: Create ESLint security config
        run: |
          cat > .eslintrc.security.js << 'EOF'
          module.exports = {
            root: true,
            extends: [
              'plugin:security/recommended-legacy',
              'plugin:@microsoft/sdl/recommended',
            ],
            plugins: [
              'security',
              'no-secrets',
            ],
            parserOptions: {
              ecmaVersion: 2022,
              sourceType: 'module',
              ecmaFeatures: { jsx: true },
            },
            rules: {
              // Detect hardcoded secrets (tokens, passwords, API keys)
              'no-secrets/no-secrets': ['warn', { tolerance: 5 }],
              // Prevent eval() and similar dangerous patterns
              'security/detect-eval-with-expression': 'error',
              'security/detect-non-literal-fs-filename': 'warn',
              'security/detect-unsafe-regex': 'error',
              'security/detect-buffer-noassert': 'error',
              'security/detect-child-process': 'warn',
              'security/detect-disable-mustache-escape': 'error',
              'security/detect-no-csrf-before-method-override': 'error',
              'security/detect-non-literal-regexp': 'warn',
              'security/detect-non-literal-require': 'warn',
              'security/detect-object-injection': 'warn',
              'security/detect-possible-timing-attacks': 'warn',
              'security/detect-pseudoRandomBytes': 'error',
              // HIPAA: ensure no PHI in logs
              '@microsoft/sdl/no-unsafe-url-assignments': 'error',
            },
            overrides: [
              {
                files: ['*.test.{ts,tsx}', '*.spec.{ts,tsx}', '**/__mocks__/**'],
                rules: {
                  'no-secrets/no-secrets': 'off',
                  'security/detect-non-literal-fs-filename': 'off',
                },
              },
            ],
            ignorePatterns: [
              'node_modules/',
              'dist/',
              'build/',
              '*.min.js',
              'coverage/',
              'playwright-report/',
            ],
          };
          EOF

      - name: Run ESLint security scan
        run: |
          npx --no-install eslint \
            --no-eslintrc \
            --config .eslintrc.security.js \
            --resolve-plugins-relative-to . \
            --ext .ts,.tsx,.js,.jsx \
            apps/web/src/ packages/ \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-security-results.sarif \
            || ESLINT_EXIT=$?
          echo "eslint_exit=${ESLINT_EXIT:-0}" >> "$GITHUB_ENV"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: eslint-security-results.sarif
          category: eslint-security

      - name: Fail on critical security findings
        if: env.EMERGENCY_OVERRIDE != 'true'
        run: |
          if [ "${{ env.eslint_exit }}" != "0" ] && [ "${{ env.eslint_exit }}" != "" ]; then
            echo "::error::ESLint security plugin found critical issues. Review SARIF output."
            echo "::error::To override for emergency hotfix, re-run with emergency_override=true"
            exit 1
          fi
          echo "No critical ESLint security findings."

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4: Notify on emergency override
  # ───────────────────────────────────────────────────────────────────────────
  notify-override:
    name: Emergency Override Notification
    runs-on: ubuntu-latest
    needs: [bandit, semgrep, eslint-security]
    if: github.event.inputs.emergency_override == 'true'
    steps:
      - name: Log emergency override warning
        run: |
          echo "::warning::SECURITY SCAN EMERGENCY OVERRIDE WAS USED"
          echo "::warning::This is a tracked event. Post-incident review required within 24 hours."
          echo "::warning::Override triggered by: ${{ github.actor }}"
          echo "::warning::Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Create incident tracking issue
        uses: actions/github-script@v7
        env:
          ACTOR: ${{ github.actor }}
          WORKFLOW: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
        with:
          # Read untrusted context (actor, ref) from env, never interpolate
          # ${{ github.* }} directly into the script body — that path is a
          # documented GitHub Actions script-injection vector.
          script: |
            const actor = process.env.ACTOR;
            const workflow = process.env.WORKFLOW;
            const runUrl = `${process.env.SERVER_URL}/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`;
            const sha = process.env.SHA;
            const ref = process.env.REF;

            const body = `## 🚨 Security Scan Emergency Override Used

            **Triggered by:** @${actor}
            **Workflow:** ${workflow}
            **Run:** ${runUrl}
            **Commit:** ${sha}
            **Branch:** ${ref}

            ### Required Actions (within 24 hours)
            - [ ] Document business justification for override
            - [ ] Review all security findings that were bypassed
            - [ ] Create remediation tickets for each finding
            - [ ] Schedule post-incident review meeting
            - [ ] Obtain security team sign-off

            ### HIPAA Impact
            This override bypasses §164.308(a)(8) security scanning controls.
            A compensating control must be documented.

            /cc @security-team`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SECURITY] Scan override used on ${ref} by ${actor}`,
              body: body,
              labels: ['security', 'emergency-override', 'hipaa-review'],
            });

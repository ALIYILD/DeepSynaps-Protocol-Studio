# DeepSynaps Protocol Studio — Frontend E2E Tests
# Runs Playwright E2E tests on push/PR to main.
# Uses demo/synthetic data only — no real PHI.

name: E2E Tests

on:
  push:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Build frontend
        run: npm run build

      - name: Run backend in background
        working-directory: apps/api
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          python -m uvicorn src.deepsynaps.main:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/backend.pid
          sleep 5
          curl -s http://127.0.0.1:8000/health || echo "Backend may not have requirements installed"
        continue-on-error: true

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          CI: "true"
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/e2e-report/
          retention-days: 7

      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            apps/web/e2e-results/
            apps/web/test-results/
          retention-days: 7

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/backend.pid) 2>/dev/null || true

# DeepSynaps Protocol Studio — Fly.io configuration
#
# Required secrets (set via `fly secrets set KEY=value`):
#   DEEPSYNAPS_DATABASE_URL   — PostgreSQL connection string for production DB
#   STRIPE_SECRET_KEY         — Stripe secret key (when payments are enabled)
#   STRIPE_WEBHOOK_SECRET     — Stripe webhook signing secret
#   JWT_SECRET_KEY            — Secret key for JWT signing (when auth is enabled)
#   SENTRY_DSN                — Sentry DSN for error tracking (optional)

app = "deepsynaps-studio"
primary_region = "lhr"

[build]

[env]
  DEEPSYNAPS_APP_ENV = "production"
  DEEPSYNAPS_API_HOST = "0.0.0.0"
  DEEPSYNAPS_API_PORT = "8080"
  DEEPSYNAPS_LOG_LEVEL = "INFO"
  DEEPSYNAPS_CORS_ORIGINS = "https://deepsynaps-studio.fly.dev"
  PORT = "8080"
  # Evidence pipeline DB on the persistent /data volume (see [[mounts]] below).
  # The evidence_router returns 503 with a clear message until populated.
  EVIDENCE_DB_PATH = "/data/evidence.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "45s"
  interval = "10s"
  method = "GET"
  timeout = "5s"
  path = "/health"

# Persistent volume backing /data (evidence DB, media uploads, sqlite fallback).
# Prerequisite: create the volume once per region before the first deploy:
#   fly volumes create deepsynaps_data --region lhr --size 1
# See DEPLOYMENT.md § 4 for full first-time setup.
[[mounts]]
  source = "deepsynaps_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

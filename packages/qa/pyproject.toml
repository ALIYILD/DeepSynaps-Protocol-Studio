[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "deepsynaps-qa"
version = "0.1.0"
description = "Artifact completeness scoring engine for DeepSynaps Studio"
requires-python = ">=3.11"
authors = [{ name = "DeepSynaps Studio" }]
license = { text = "Proprietary" }
dependencies = [
    "pydantic>=2.11.0,<3.0.0",
    "jsonschema>=4.20.0",
    "typer>=0.12.0",
    "textstat>=0.7.3",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
redaction = [
    "presidio-analyzer>=2.2",
    "presidio-anonymizer>=2.2",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.5.0",
]

[project.scripts]
studio-qa = "deepsynaps_qa.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "B", "UP", "S", "RUF"]
ignore = ["S101", "S105", "B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "deepsynaps-biometrics-pipeline"
version = "0.1.0"
description = "Normalized biometrics schema, ingestion, and analytics for DeepSynaps wearables (HealthKit, Health Connect, Oura)."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.11.0,<3.0.0",
    "numpy>=1.26.0,<3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.3",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers"

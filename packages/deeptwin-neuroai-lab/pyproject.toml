[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "deeptwin-neuroai-lab"
version = "0.1.0"
description = "Research-only multimodal timeline and feature-preview utilities for DeepTwin (not clinical)."
requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "pydantic>=2.11.0,<3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0,<9.0.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

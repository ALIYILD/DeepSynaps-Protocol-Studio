[project]
name = "deepsynaps-video"
version = "0.1.0"
description = "Clinical video analyzer for DeepSynaps Studio — pose, gait, tremor, bradykinesia, posture, facial-motor, and continuous patient monitoring"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "Sehzade Yildirim", email = "sehzadeyildirim@hotmail.com" }]

# Slim core only. Heavy CV / pose / ML deps live in
# ``[project.optional-dependencies]`` so this package installs cleanly inside
# the Studio Dockerfile on ``python:3.11-slim``. Each pipeline stage guards its
# own heavy imports — the façade in apps/api treats the optional dep stack as
# absent by default and surfaces a styled "unavailable" envelope rather than
# crashing the API worker. This mirrors the mri-pipeline / qeeg-pipeline
# pattern.
dependencies = [
    "jinja2>=3.1",
    "numpy>=1.24",
    "pandas>=2.0",
    "pydantic>=2.5",
    "scipy>=1.11",
]

[project.optional-dependencies]
# `pip install -e '.[cv]'` for the basic CV stack (ingest + face-blur deid).
cv = [
    "opencv-python>=4.9",
    "av>=12.0",
    "pillow>=10.0",
    "imageio>=2.34",
    "imageio-ffmpeg>=0.4.9",
]
# `pip install -e '.[pose]'` for the pluggable HPE backends. Real runs require
# at least one backend installed; the engine dispatches to whatever is present.
pose = [
    "mediapipe>=0.10",
    "torch>=2.1",
    "torchvision>=0.16",
    # mmpose / mmcv are not declared as hard deps because their build chain is
    # finicky on python:3.11-slim. Install via the Docker image when needed.
]
# `pip install -e '.[detect]'` for object detection + tracking (monitoring).
detect = [
    "ultralytics>=8.2",
    "lap>=0.4",
]
# `pip install -e '.[reporting]'` to enable Jinja+WeasyPrint PDF rendering.
reporting = [
    "weasyprint>=60",
    "matplotlib>=3.7",
    "plotly>=5.18",
    "kaleido>=0.2.1",
]
# `pip install -e '.[api]'` for standalone FastAPI + Celery deployment.
api = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "celery>=5.3",
    "redis>=5.0",
    "boto3>=1.34",
    "httpx>=0.27",
]
# `pip install -e '.[db]'` for pgvector-backed MedRAG retrieval against the
# shared ``deepsynaps`` Postgres instance.
db = [
    "psycopg[binary]>=3.1",
    "pgvector>=0.3",
    "sqlalchemy>=2.0",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "ruff>=0.3",
    "mypy>=1.8",
]
gpu = [
    "torch>=2.1",
    # YOLOv8/v9/v11 weights pulled at runtime by Ultralytics.
]

[project.scripts]
ds-video = "deepsynaps_video.cli:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers"

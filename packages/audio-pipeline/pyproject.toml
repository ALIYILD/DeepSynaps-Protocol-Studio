[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "deepsynaps-audio-pipeline"
version = "0.1.0"
description = "Audio and voice biomarker analysis pipeline for DeepSynaps Studio"
requires-python = ">=3.11"
license = { text = "Proprietary" }
dependencies = [
    "numpy>=1.26.0,<3.0.0",
]

[project.optional-dependencies]
audio = [
    "soundfile>=0.13.0",
]
dev = [
    "pytest>=8.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers"

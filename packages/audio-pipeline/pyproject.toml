[project]
name = "deepsynaps-audio"
version = "0.1.0"
description = "Audio / Voice Analyzer for DeepSynaps Studio clinical dashboard — clinical voice acoustics, neurological voice biomarkers, neuromodulation follow-up, and (v2) cognitive + respiratory voice analysis"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "Sehzade Yildirim", email = "sehzadeyildirim@hotmail.com" }]

# Core deps only. Heavy clinical-audio dependencies live in
# ``[project.optional-dependencies]`` so this package installs cleanly inside
# the Studio Dockerfile on ``python:3.11-slim``. Each pipeline stage guards
# its own heavy imports — the façade falls back to a styled "unavailable"
# envelope rather than crashing the API worker.
#
# This mirrors the qeeg-pipeline / mri-pipeline slim pattern.
dependencies = [
    "jinja2>=3.1",
    "numpy>=1.24",
    "pandas>=2.0",
    "pydantic>=2.5",
    "scipy>=1.11",
]

[project.optional-dependencies]
# `pip install -e '.[acoustic]'` for the Praat-based clinical acoustic
# feature engine (F0 / jitter / shimmer / HNR / NHR / formants /
# voice-break / spectral / MFCC). This is the v1 must-have stack.
acoustic = [
    "praat-parselmouth>=0.4.3",
    "librosa>=0.10",
    "soundfile>=0.12",
    "audioread>=3.0",
]
# `pip install -e '.[acoustic-extras]'` adds the standardised eGeMAPS /
# ComParE feature vector via openSMILE. Optional in v1 — pipeline
# degrades to Praat-only when missing.
acoustic-extras = [
    "opensmile>=2.5",
]
# `pip install -e '.[quality]'` for telehealth-grade QC: LUFS loudness,
# clipping detection, VAD speech ratio.
quality = [
    "pyloudnorm>=0.1.1",
    "webrtcvad>=2.0.10",
]
# `pip install -e '.[linguistic]'` for the speech-linguistic engine
# (ASR + prosody + lexical + syntactic features). v2 GA, v1 preview.
linguistic = [
    "faster-whisper>=1.0",
    "vosk>=0.3.45",
    "spacy>=3.7",
    "nltk>=3.8",
    "textstat>=0.7",
]
# `pip install -e '.[respiratory]'` for cough / breath segmentation
# and respiratory acoustic risk scoring (v2 module).
respiratory = [
    "pyAudioAnalysis>=0.3.14",
    "panns-inference>=0.1.0",
]
# `pip install -e '.[ml]'` for the trained scoring models (PD
# likelihood, dysarthria severity, MCI risk, GRBAS estimator,
# cough classifier).
ml = [
    "scikit-learn>=1.3",
    "lightgbm>=4.0",
    "joblib>=1.3",
    "torch>=2.1",
]
# `pip install -e '.[reporting]'` to enable Jinja+WeasyPrint PDF
# rendering. Needs system libs: libpango, libcairo, libgdk-pixbuf —
# NOT installed by the Studio Dockerfile base image. The façade falls
# back to a plain HTML summary without these.
reporting = [
    "weasyprint>=60",
    "matplotlib>=3.7",
    "plotly>=5.18",
    "kaleido>=0.2.1",
]
# `pip install -e '.[api]'` for standalone FastAPI + Celery deployment
# outside the Studio monorepo. Studio's API image already carries
# FastAPI so this extra is rarely needed there.
api = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "celery>=5.3",
    "redis>=5.0",
    "boto3>=1.34",
    "httpx>=0.27",
]
# `pip install -e '.[db]'` for pgvector-backed MedRAG retrieval
# against the shared ``deepsynaps`` Postgres instance.
db = [
    "psycopg[binary]>=3.1",
    "pgvector>=0.3",
    "sqlalchemy>=2.0",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "ruff>=0.3",
    "mypy>=1.8",
]

[project.scripts]
ds-audio = "deepsynaps_audio.cli:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers"

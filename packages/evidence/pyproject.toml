[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "deepsynaps-evidence"
version = "0.1.0"
description = "Evidence Citation Validator — pgvector corpus grounding, GRADE scoring, hash-chained audit for DeepSynaps Studio"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Sehzade Yildirim", email = "sehzadeyildirim@hotmail.com" }]
dependencies = [
    "pydantic>=2.5.0,<3.0.0",
]

[project.optional-dependencies]
pgvector = ["pgvector>=0.3.0"]
dev = ["pytest>=8.0", "pytest-cov>=4.1"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --strict-markers"
